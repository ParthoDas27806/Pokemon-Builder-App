// Heuristic held-item suggestions limited to what's actually purchasable in Pokémon Champions.
function suggestChampionsItems(name, types) {
  const opts = [];
  if (MEGA_STONES[name]) opts.push({
    item: MEGA_STONES[name],
    reason: "Lets it Mega Evolve in battle"
  });
  const stab = TYPE_BOOST_ITEMS[types[0]];
  if (stab) opts.push({
    item: stab,
    reason: `Boosts its own ${prettyName(types[0])}-type moves by 20%`
  });
  let worst = null,
    worstMult = 1;
  TYPE_LIST.forEach(atk => {
    const m = comboMultiplier(atk, types);
    if (m > worstMult) {
      worstMult = m;
      worst = atk;
    }
  });
  if (worst && RESIST_BERRIES[worst]) opts.push({
    item: RESIST_BERRIES[worst],
    reason: `Softens its ${prettyName(worst)} weakness (×${worstMult})`
  });
  opts.push({
    item: "Leftovers",
    reason: "Safe passive recovery every turn"
  });
  opts.push({
    item: "Focus Sash",
    reason: "Survives one hit at full HP if it's frail"
  });
  return opts.slice(0, 4);
}

// Parse a free-typed/pasted list of Pokémon names against the known dex list.
function parseRosterText(text, allList) {
  const norm = s => s.toLowerCase().trim().replace(/[’'.]/g, "").replace(/\s+/g, "-");
  const tokens = text.split(/[,\n]/).map(t => t.trim()).filter(Boolean);
  const byName = new Map(allList.map(p => [p.name, p]));
  const matched = [];
  const unmatched = [];
  const seen = new Set();
  tokens.forEach(tok => {
    const key = norm(tok);
    let found = byName.get(key);
    if (!found) found = allList.find(p => p.name.startsWith(key) && key.length >= 3);
    if (found && !seen.has(found.id)) {
      matched.push(found);
      seen.add(found.id);
    } else if (!found) unmatched.push(tok);
  });
  return {
    matched,
    unmatched
  };
}

// Score a candidate team: reward type coverage + offensive diversity, penalise shared weaknesses.
function scoreTeam(members, detailCache) {
  const stab = new Set();
  const weakCount = {};
  members.forEach(p => {
    const types = detailCache[p.id] || [];
    types.forEach(t => stab.add(t));
    TYPE_LIST.forEach(atk => {
      const m = comboMultiplier(atk, types);
      if (m >= 2) weakCount[atk] = (weakCount[atk] || 0) + 1;
    });
  });
  const uncovered = TYPE_LIST.filter(t => ![...stab].some(s => mult(s, t) >= 2)).length;
  const coverage = TYPE_LIST.length - uncovered;
  const sharedWeakPenalty = Object.values(weakCount).reduce((s, c) => s + Math.max(0, c - 1), 0);
  return coverage * 3 - sharedWeakPenalty * 2 + stab.size;
}

// Greedily build the strongest 6-Pokémon team from a pool, given their cached types.
function autoBuildTeam(pool, detailCache, maxSize = 6) {
  const candidates = pool.filter(p => detailCache[p.id]);
  const team = [];
  const notes = [];
  for (let i = 0; i < maxSize && team.length < candidates.length; i++) {
    let best = null,
      bestScore = -Infinity;
    candidates.forEach(c => {
      if (team.some(t => t.id === c.id)) return;
      const score = scoreTeam([...team, c], detailCache);
      if (score > bestScore) {
        bestScore = score;
        best = c;
      }
    });
    if (!best) break;
    const beforeStab = new Set(team.flatMap(p => detailCache[p.id] || []));
    const newTypes = (detailCache[best.id] || []).filter(t => !beforeStab.has(t));
    notes.push({
      id: best.id,
      newTypes
    });
    team.push(best);
  }
  return {
    team,
    notes
  };
}
