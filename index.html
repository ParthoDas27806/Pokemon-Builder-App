<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pokédex Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
var FIREBASE_CONFIG = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
window.__FIREBASE_READY = false;
try {
  if (FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(FIREBASE_CONFIG);
    window.__FIREBASE_READY = true;
  }
} catch(e) { console.warn("Firebase not configured:", e); }
</script>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #15181D; font-family: system-ui, sans-serif; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #2A3038; border-radius: 3px; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.spin { animation: spin 0.8s linear infinite; }
@keyframes scanIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
#boot { color: #8B9099; padding: 24px; font-size: 14px; font-family: monospace; }
#err { display:none; background:#3A201E; color:#F0B8B0; border:1px solid #E5483D; border-radius:8px; margin:16px; padding:14px; font-size:13px; white-space:pre-wrap; font-family:monospace; }
</style>
</head>
<body>
<div id="err"></div>
<div id="root"><div id="boot">Loading Pokédex Terminal...</div></div>
<script>
window.onerror = function(msg, src, line, col, err) {
  var b = document.getElementById("err");
  b.style.display = "block";
  b.textContent = "Error: " + (err ? err.message : msg) + (src ? "\n" + src + ":" + line : "");
};
window.onunhandledrejection = function(e) {
  var b = document.getElementById("err");
  b.style.display = "block";
  b.textContent = "Promise error: " + (e.reason && e.reason.message ? e.reason.message : String(e.reason));
};
</script>
<script src="app.js"></script>
</body>
</html>
