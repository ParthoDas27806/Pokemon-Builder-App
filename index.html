// Heuristic held-item suggestions limited to what's actually purchasable in Pokémon Champions.
function suggestChampionsItems(name, types) {
  const opts = [];
  if (MEGA_STONES[name]) opts.push({
    item: MEGA_STONES[name],
    reason: "Lets it Mega Evolve in battle"
  });
  const stab = TYPE_BOOST_ITEMS[types[0]];
  if (stab) opts.push({
    item: stab,
    reason: `Boosts its own ${prettyName(types[0])}-type moves by 20%`
  });
  let worst = null,
    worstMult = 1;
  TYPE_LIST.forEach(atk => {
    const m = comboMultiplier(atk, types);
    if (m > worstMult) {
      worstMult = m;
      worst = atk;
    }
  });
  if (worst && RESIST_BERRIES[worst]) opts.push({
    item: RESIST_BERRIES[worst],
    reason: `Softens its ${prettyName(worst)} weakness (×${worstMult})`
  });
  opts.push({
    item: "Leftovers",
    reason: "Safe passive recovery every turn"
  });
  opts.push({
    item: "Focus Sash",
    reason: "Survives one hit at full HP if it's frail"
  });
  return opts.slice(0, 4);
}

const STATUS_KEYWORDS = ["protect", "recover", "roost", "swords-dance", "calm-mind", "toxic", "will-o-wisp", "stealth-rock", "substitute", "nasty-plot", "iron-defense", "agility", "taunt", "thunder-wave", "spore", "sleep-powder", "synthesis", "moonlight", "morning-sun", "rest", "curse", "bulk-up", "dragon-dance"];
function collectCandidateMoveNames(full) {
  const seen = new Set();
  const lvl = [];
  const tm = [];
  full.moves.forEach(m => {
    const detail = m.version_group_details[m.version_group_details.length - 1];
    const method = detail?.move_learn_method?.name;
    if (seen.has(m.move.name)) return;
    if (method === "level-up") {
      lvl.push({
        name: m.move.name,
        level: detail.level_learned_at
      });
      seen.add(m.move.name);
    } else if (method === "machine" && tm.length < 15) {
      tm.push(m.move.name);
      seen.add(m.move.name);
    }
  });
  lvl.sort((a, b) => b.level - a.level);
  return [...lvl.slice(0, 12).map(m => m.name), ...tm];
}
function pickMoveset(full, moveDetails) {
  const stats = {};
  full.stats.forEach(s => stats[s.stat.name] = s.base_stat);
  const preferredClass = (stats.attack || 0) >= (stats["special-attack"] || 0) ? "physical" : "special";
  const types = full.types.map(t => t.type.name);
  const names = collectCandidateMoveNames(full);
  const scored = names.map(name => {
    const d = moveDetails[name];
    if (!d || d.power == null) return null;
    const stab = types.includes(d.type) ? 1.5 : 1;
    const classMatch = d.dmgClass === preferredClass ? 1.2 : 0.75;
    return {
      name,
      type: d.type,
      power: d.power,
      dmgClass: d.dmgClass,
      score: d.power * stab * classMatch
    };
  }).filter(Boolean);
  scored.sort((a, b) => b.score - a.score);
  const picked = [];
  const usedTypes = new Set();
  for (const m of scored) {
    if (picked.length >= 3) break;
    if (usedTypes.has(m.type)) continue;
    picked.push(m);
    usedTypes.add(m.type);
  }
  for (const m of scored) {
    if (picked.length >= 3) break;
    if (!picked.some(p => p.name === m.name)) picked.push(m);
  }
  let statusPick = null;
  for (const name of names) {
    const d = moveDetails[name];
    if (d && d.power == null && STATUS_KEYWORDS.some(k => name.includes(k))) {
      statusPick = {
        name,
        type: d.type,
        power: null,
        dmgClass: "status"
      };
      break;
    }
  }
  if (statusPick) picked.push(statusPick);else if (scored[3]) picked.push(scored[3]);
  return picked.slice(0, 4);
}
function parseRosterText(text, allList) {
  const norm = s => s.toLowerCase().trim().replace(/[’'.]/g, "").replace(/\s+/g, "-");
  const tokens = text.split(/[,\n]/).map(t => t.trim()).filter(Boolean);
  const byName = new Map(allList.map(p => [p.name, p]));
  const matched = [];
  const unmatched = [];
  const seen = new Set();
  tokens.forEach(tok => {
    const key = norm(tok);
    let found = byName.get(key);
    if (!found) found = allList.find(p => p.name.startsWith(key) && key.length >= 3);
    if (found && !seen.has(found.id)) {
      matched.push(found);
      seen.add(found.id);
    } else if (!found) unmatched.push(tok);
  });
  return {
    matched,
    unmatched
  };
}

   COMPETITIVE TEAM ENGINE
   ============================================================ */

// Stat thresholds for role detection (base stats)
function detectRoles(stats, types) {
  const {
    hp = 0,
    attack = 0,
    defense = 0,
    "special-attack": spa = 0,
    "special-defense": spd = 0,
    speed = 0
  } = stats;
  const bst = hp + attack + defense + spa + spd + speed;
  const roles = [];

  // Sweepers need power + speed
  if (attack >= 100 && speed >= 80) roles.push("Physical Sweeper");
  if (spa >= 100 && speed >= 80) roles.push("Special Sweeper");
  // Setup sweeper (high attack/spa but medium speed - wants to set up first)
  if ((attack >= 100 || spa >= 100) && speed < 80 && speed > 55) roles.push("Setup Sweeper");
  // Trick Room abusers
  if ((attack >= 100 || spa >= 100) && speed <= 55) roles.push("Trick Room Abuser");
  // Walls/Tanks
  if (defense >= 100 && hp >= 80) roles.push("Physical Wall");
  if (spd >= 100 && hp >= 80) roles.push("Special Wall");
  if (defense >= 80 && spd >= 80 && hp >= 90) roles.push("Mixed Wall");
  // Pivots: decent bulk + speed, used to bring in teammates safely
  if (speed >= 70 && (defense >= 70 || spd >= 70) && bst >= 480) roles.push("Pivot");
  // Fast utility: high speed, not necessarily high offense
  if (speed >= 105) roles.push("Speed Control / Lead");
  // Bulky support: can't sweep, decent bulk
  if ((defense >= 85 || spd >= 85) && attack < 90 && spa < 90) roles.push("Support");
  // Wallbreaker: huge offense, doesn't care about speed
  if ((attack >= 120 || spa >= 120) && speed < 90) roles.push("Wallbreaker");
  return roles.length ? roles.slice(0, 2) : ["All-Rounder"];
}

// Assess each Pokémon in the pool individually before building the team
function analyzePool(pool, fullDataMap) {
  return pool.map(p => {
    const full = fullDataMap[p.id];
    if (!full) return {
      ...p,
      roles: ["Unknown"],
      stats: {},
      bst: 0
    };
    const stats = {};
    full.stats.forEach(s => stats[s.stat.name] = s.base_stat);
    const bst = Object.values(stats).reduce((a, b) => a + b, 0);
    const types = full.types.map(t => t.type.name);
    const roles = detectRoles(stats, types);
    return {
      ...p,
      roles,
      stats,
      bst,
      types
    };
  }).sort((a, b) => b.bst - a.bst);
